patch:
  style:
    color_scheme: ms_sogou
    # color_scheme: ms_wechat_light
    # color_scheme: ms_wechat_dark
    # color_scheme: ms_google
    # color_scheme: google

    font_face: "微软雅黑"
    font_point: 15
    horizontal: true
    inline_preedit: true
    label_font_point: 15
    layout:
      border: 2
      round_corner: 0
      margin_x: 5
      margin_y: 5
      hilite_padding: 5
      hilite_spacing: 5
      spacing: 5
      candidate_spacing: 20
      candidate_max_count: 9  # 设置最大候选词数为 9

  preset_color_schemes:
    ms_sogou:
      name: 搜狗
      author: Mark24Code
      back_color: 0xFFFFFF
      border_color: 0xFFFFFF
      text_color: 0xD9884F
      hilited_text_color: 0xD9884F
      hilited_back_color: 0xFFFFFF
      hilited_candidate_text_color: 0x0D4FE9
      hilited_candidate_back_color: 0xFFFFFF
      candidate_text_color: 0xD67F42
      comment_text_color: 0xFFFFFF
      candidate_max_count: 9  # 设置最大候选词数为 9

    ms_wechat_light:
      name: 微信light
      author: Mark24Code
      back_color: 0xFFFFFF
      border_color: 0xFFFFFF
      text_color: 0x69AD2E
      hilited_text_color: 0xFFFFFF
      hilited_back_color: 0x69AD2E
      hilited_candidate_text_color: 0xFFFFFF
      hilited_candidate_back_color: 0x69AD2E
      candidate_text_color: 0x69AD2E
      comment_text_color: 0xFFFFFF
      candidate_max_count: 9  # 设置最大候选词数为 9

    ms_wechat_dark:
      name: 微信dark
      author: Mark24Code
      back_color: 0x000000
      border_color: 0x000000
      text_color: 0x69AD2E
      hilited_text_color: 0xD8D8D8
      hilited_back_color: 0x69AD2E
      hilited_candidate_text_color: 0xD8D8D8
      hilited_candidate_back_color: 0x69AD2E
      candidate_text_color: 0x69AD2E
      comment_text_color: 0xFFFFFF
      candidate_max_count: 9  # 设置最大候选词数为 9
      
    ms_google:
      name: Google 风格
      author: 自定义
      back_color: 0xFFFFFF
      border_color: 0xE0E0E0
      text_color: 0x202124
      hilited_back_color: 0xF1F3F4
      hilited_text_color: 0x1967D2
      hilited_candidate_back_color: 0xF1F3F4
